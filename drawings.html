<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F5F7FA">
  <title>Drawings — HVAC Nexus</title>
  <link rel="stylesheet" href="app.css">
  <style>
    /* ── Drawings List ── */
    .search-bar {
      position: relative;
      margin-bottom: 14px;
    }
    .search-bar svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
      width: 18px; height: 18px;
    }
    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 11px 12px 11px 40px;
      font-size: 15px;
      font-family: var(--font);
      color: var(--text-primary);
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-tertiary); }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .discipline-group { margin-bottom: 8px; }
    .discipline-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .discipline-header.open { border-radius: var(--radius-md) var(--radius-md) 0 0; border-bottom: none; }
    .discipline-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .discipline-count {
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .discipline-chevron {
      color: var(--text-tertiary);
      transition: transform 0.2s;
    }
    .discipline-header.open .discipline-chevron { transform: rotate(180deg); }

    .discipline-body {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius-md) var(--radius-md);
      overflow: hidden;
    }
    .discipline-body.open { display: block; }

    .drawing-row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .drawing-row:last-child { border-bottom: none; }
    .drawing-row:active { background: var(--bg-elevated); }
    .drawing-num {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      min-width: 80px;
      flex-shrink: 0;
    }
    .drawing-info { flex: 1; min-width: 0; }
    .drawing-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .drawing-meta {
      font-size: 11px;
      color: var(--text-tertiary);
      display: flex;
      gap: 8px;
    }
    .dwg-status {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .st-ifr  { background: #FEF3C7; color: #92400E; }
    .st-ifa  { background: #DBEAFE; color: #1E40AF; }
    .st-ifc  { background: #D1FAE5; color: #065F46; }
    .st-ab   { background: #EDE9FE; color: #4C1D95; }
    .st-obs  { background: #F1F5F9; color: #94A3B8; text-decoration: line-through; }

    /* ── Drawing Viewer ── */
    #viewer-page {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      z-index: 200;
      display: none;
      flex-direction: column;
    }
    #viewer-page.open { display: flex; }

    .viewer-header {
      height: 52px;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .viewer-title {
      flex: 1;
      min-width: 0;
    }
    .viewer-title .t1 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-title .t2 {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    .viewer-btn {
      width: 40px; height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      flex-shrink: 0;
      background: rgba(255,255,255,0.08);
      -webkit-tap-highlight-color: transparent;
    }
    .viewer-btn:active { opacity: 0.7; }
    .viewer-btn svg { width: 20px; height: 20px; }

    /* Canvas container */
    #canvas-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      touch-action: none;
    }
    #dwg-canvas {
      position: absolute;
      transform-origin: 0 0;
      cursor: grab;
    }
    #dwg-canvas.placing { cursor: crosshair; }

    /* Pins layer */
    #pins-layer {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      transform-origin: 0 0;
    }
    .pin-marker {
      position: absolute;
      width: 32px; height: 32px;
      border-radius: 50% 50% 50% 0;
      transform: translate(-50%, -100%) rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: all;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .pin-marker span {
      transform: rotate(45deg);
      font-size: 10px;
      font-weight: 700;
      color: #fff;
    }
    .pin-defect  { background: #EF4444; }
    .pin-itp     { background: #22C55E; }
    .pin-fire    { background: #F97316; }

    /* Viewer toolbar */
    .viewer-toolbar {
      height: 60px;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: space-around;
      flex-shrink: 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 12px;
      border-radius: 8px;
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      font-weight: 500;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }
    .tool-btn svg { width: 22px; height: 22px; }
    .tool-btn.active { color: #fff; background: rgba(255,255,255,0.1); }
    .tool-btn.defect-active { color: #EF4444; }
    .tool-btn.itp-active    { color: #22C55E; }
    .tool-btn.fire-active   { color: #F97316; }

    /* Pin modal */
    .pin-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 400;
      display: flex;
      align-items: flex-end;
    }
    .pin-modal {
      background: var(--bg-card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
      animation: sheetUp 0.25s ease;
    }
    .pin-modal h3 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
    }
    .pin-modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .pin-modal-actions .btn { flex: 1; }

    /* Pin detail sheet */
    .pin-detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 400;
      display: flex;
      align-items: flex-end;
    }
    .pin-detail {
      background: var(--bg-card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 70vh;
      overflow-y: auto;
      padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
      animation: sheetUp 0.25s ease;
    }
    .pin-detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .pin-ref {
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font-mono);
    }
    .pin-ref.defect { color: #EF4444; }
    .pin-ref.itp    { color: #22C55E; }
    .pin-ref.fire   { color: #F97316; }
    .detail-field { margin-bottom: 12px; }
    .detail-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .detail-value {
      font-size: 14px;
      color: var(--text-primary);
    }

    /* Empty state for viewer */
    .viewer-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.3);
      gap: 12px;
    }
    .viewer-empty svg { width: 48px; height: 48px; opacity: 0.3; }
    .viewer-empty p { font-size: 14px; }
  </style>
</head>
<body>
  <!-- Drawings List (rendered by app.js into #app-main) -->
  <!-- This file handles the viewer overlay -->

  <!-- ── Drawing Viewer ── -->
  <div id="viewer-page">
    <div class="viewer-header">
      <button class="viewer-btn" onclick="closeViewer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="viewer-title">
        <div class="t1" id="vwr-num">—</div>
        <div class="t2" id="vwr-name">—</div>
      </div>
      <button class="viewer-btn" onclick="vwrFit()" title="Fit to screen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      </button>
    </div>

    <div id="canvas-wrap">
      <canvas id="dwg-canvas"></canvas>
      <div id="pins-layer"></div>
      <div class="viewer-empty" id="vwr-empty" style="display:none;position:absolute;inset:0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>No PDF attached to this drawing</p>
      </div>
    </div>

    <div class="viewer-toolbar">
      <button class="tool-btn" id="tool-pan" onclick="setTool('pan')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v0a2 2 0 0 0-2-2 2 2 0 0 0-2 2v0a2 2 0 0 0-2-2 2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h6.5a2 2 0 0 1 2 2 2 2 0 0 0 2-2v-6.5"/></svg>
        Pan
      </button>
      <button class="tool-btn" id="tool-defect" onclick="setTool('defect')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Defect
      </button>
      <button class="tool-btn" id="tool-itp" onclick="setTool('itp')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        ITP
      </button>
      <button class="tool-btn" id="tool-fire" onclick="setTool('fire')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 2c0 6-8 8-8 14a8 8 0 0 0 16 0c0-6-8-8-8-14z"/></svg>
        Fire
      </button>
      <button class="tool-btn" id="tool-zoom-in" onclick="vwrZoom(1.3)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        Zoom+
      </button>
      <button class="tool-btn" id="tool-zoom-out" onclick="vwrZoom(0.77)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        Zoom-
      </button>
    </div>
  </div>

  <!-- ── Pin Modal (add pin) ── -->
  <div id="pin-modal-overlay" style="display:none" class="pin-modal-overlay" onclick="if(event.target===this)closePinModal()">
    <div class="pin-modal">
      <h3 id="pin-modal-title">Add Defect</h3>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="pin-desc" class="form-input" rows="3" placeholder="Describe the issue..."></textarea>
      </div>
      <div class="form-group" id="pin-location-group">
        <label class="form-label">Location / Reference</label>
        <input id="pin-location" class="form-input" type="text" placeholder="e.g. Level 3, Grid C4">
      </div>
      <div class="form-group" id="pin-status-group">
        <label class="form-label">Status</label>
        <select id="pin-status" class="form-input">
          <option value="Open">Open</option>
          <option value="In Progress">In Progress</option>
          <option value="Closed">Closed</option>
        </select>
      </div>
      <div class="pin-modal-actions">
        <button class="btn btn-secondary" onclick="closePinModal()">Cancel</button>
        <button class="btn btn-primary" id="pin-save-btn" onclick="savePin()">Save Pin</button>
      </div>
    </div>
  </div>

  <!-- ── Pin Detail Sheet ── -->
  <div id="pin-detail-overlay" style="display:none" class="pin-detail-overlay" onclick="if(event.target===this)closePinDetail()">
    <div class="pin-detail" id="pin-detail-content"></div>
  </div>

  <script src="db.js"></script>
  <script>
    'use strict';

    // ── State ──────────────────────────────────────────────
    var _drawings = [];
    var _currentDrawing = null;
    var _currentTool = 'pan';
    var _pendingPinCoords = null;

    // Viewer pan/zoom state
    var _scale = 1;
    var _tx = 0, _ty = 0;
    var _dragging = false;
    var _lastX = 0, _lastY = 0;
    var _pdfDoc = null;
    var _pdfPage = null;

    // Touch state
    var _touches = {};
    var _lastPinchDist = 0;

    // ── Load Drawings ──────────────────────────────────────
    async function loadDrawings() {
      var proj = window.dbGetCurrentProject ? dbGetCurrentProject() : JSON.parse(localStorage.getItem('hvacnexus_current_project') || 'null');
      if (!proj) return [];
      try {
        await dbReady;
        var companyId = localStorage.getItem('hvacnexus_company_id');
        var res = await window._supabase
          .from('drawings')
          .select('data')
          .eq('company_id', companyId)
          .eq('project_num', proj.code || proj.num || proj.id)
          .single();
        if (res.data && Array.isArray(res.data.data)) return res.data.data;
        if (res.data && res.data.data) return res.data.data;
      } catch(e) { console.warn('[Drawings] load error:', e); }
      return [];
    }

    async function saveDrawings() {
      var proj = dbGetCurrentProject();
      if (!proj) return;
      try {
        var companyId = localStorage.getItem('hvacnexus_company_id');
        var pNum = proj.code || proj.num || proj.id;
        await dbReady;
        await window._supabase.from('drawings').upsert({
          project_num: pNum,
          company_id: companyId,
          data: _drawings
        }, { onConflict: 'project_num' });
      } catch(e) { console.warn('[Drawings] save error:', e); }
    }

    // ── Render Drawings List ───────────────────────────────
    window.renderDrawingsPage = async function(container) {
      container.innerHTML = '<div class="page"><div class="spinner"></div></div>';
      _drawings = await loadDrawings();

      var disciplines = {};
      _drawings.forEach(function(d) {
        if (d.obsolete) return;
        var disc = d.discipline || 'Uncategorised';
        if (!disciplines[disc]) disciplines[disc] = [];
        disciplines[disc].push(d);
      });

      var discNames = Object.keys(disciplines);

      var html = '<div class="page">';

      // Search
      html += '<div class="search-bar">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
        + '<input class="search-input" id="dwg-search" placeholder="Search drawings…" oninput="filterDrawings()" type="search">'
        + '</div>';

      // Filter pills
      html += '<div class="filter-row" id="dwg-filters">'
        + '<button class="pill-tab active" onclick="filterByDisc(\'\')" data-disc="">All</button>';
      discNames.forEach(function(d) {
        html += '<button class="pill-tab" onclick="filterByDisc(\'' + d + '\')" data-disc="' + d + '">' + d + '</button>';
      });
      html += '</div>';

      // Drawing groups
      html += '<div id="dwg-list">';
      if (discNames.length === 0) {
        html += '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>No drawings found for this project.<br>Add drawings in the desktop app.</p></div>';
      } else {
        discNames.forEach(function(disc, i) {
          html += renderDiscGroup(disc, disciplines[disc], i === 0);
        });
      }
      html += '</div></div>';

      container.innerHTML = html;
    };

    function renderDiscGroup(disc, drawings, expanded) {
      var id = 'dg-' + disc.replace(/\s+/g, '-');
      var html = '<div class="discipline-group" data-disc="' + disc + '">'
        + '<div class="discipline-header' + (expanded ? ' open' : '') + '" onclick="toggleDisc(\'' + id + '\')" id="' + id + '-hdr">'
        +   '<div class="discipline-title">'
        +     '<span>' + disc + '</span>'
        +     '<span class="discipline-count">' + drawings.length + '</span>'
        +   '</div>'
        +   '<svg class="discipline-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>'
        + '</div>'
        + '<div class="discipline-body' + (expanded ? ' open' : '') + '" id="' + id + '-body">';

      drawings.forEach(function(d) {
        var stClass = { IFR:'st-ifr', IFA:'st-ifa', IFC:'st-ifc', 'As-Builts':'st-ab', AB:'st-ab' }[d.status] || 'st-ifr';
        var pinCount = (d.pins || []).length;
        html += '<div class="drawing-row" onclick="openViewer(\'' + d.id + '\')">'
          + '<div class="drawing-num">' + (d.num || '—') + '</div>'
          + '<div class="drawing-info">'
          +   '<div class="drawing-name">' + (d.name || d.title || 'Untitled') + '</div>'
          +   '<div class="drawing-meta">'
          +     '<span>Rev ' + (d.rev || '—') + '</span>'
          +     (pinCount > 0 ? '<span>📍 ' + pinCount + '</span>' : '')
          +   '</div>'
          + '</div>'
          + '<span class="dwg-status ' + stClass + '">' + (d.status || '—') + '</span>'
          + '</div>';
      });

      html += '</div></div>';
      return html;
    }

    window.toggleDisc = function(id) {
      var hdr = document.getElementById(id + '-hdr');
      var body = document.getElementById(id + '-body');
      if (hdr) hdr.classList.toggle('open');
      if (body) body.classList.toggle('open');
    };

    window.filterByDisc = function(disc) {
      document.querySelectorAll('.filter-row .pill-tab').forEach(function(b) {
        b.classList.toggle('active', b.dataset.disc === disc);
      });
      document.querySelectorAll('.discipline-group').forEach(function(g) {
        var show = !disc || g.dataset.disc === disc;
        g.style.display = show ? '' : 'none';
      });
    };

    window.filterDrawings = function() {
      var q = (document.getElementById('dwg-search').value || '').toLowerCase();
      document.querySelectorAll('.drawing-row').forEach(function(row) {
        var text = row.textContent.toLowerCase();
        row.style.display = text.indexOf(q) !== -1 ? '' : 'none';
      });
    };

    // ── Open Viewer ────────────────────────────────────────
    window.openViewer = function(drawingId) {
      var dwg = _drawings.find(function(d) { return d.id === drawingId; });
      if (!dwg) return;
      _currentDrawing = dwg;

      document.getElementById('vwr-num').textContent = dwg.num || '—';
      document.getElementById('vwr-name').textContent = dwg.name || dwg.title || 'Untitled';

      var vp = document.getElementById('viewer-page');
      vp.classList.add('open');

      setTool('pan');
      _scale = 1; _tx = 0; _ty = 0;

      if (dwg.pdfUrl) {
        loadPdf(dwg.pdfUrl);
      } else {
        document.getElementById('dwg-canvas').style.display = 'none';
        document.getElementById('vwr-empty').style.display = 'flex';
        document.getElementById('pins-layer').innerHTML = '';
      }

      renderPins();
    };

    window.closeViewer = function() {
      document.getElementById('viewer-page').classList.remove('open');
      _currentDrawing = null;
      _pdfDoc = null;
      _pdfPage = null;
      var canvas = document.getElementById('dwg-canvas');
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    // ── PDF Rendering ──────────────────────────────────────
    var _pdfJsLoaded = false;

    function loadPdf(url) {
      document.getElementById('vwr-empty').style.display = 'none';
      document.getElementById('dwg-canvas').style.display = 'block';

      if (!_pdfJsLoaded) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload = function() {
          pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          _pdfJsLoaded = true;
          renderPdf(url);
        };
        document.head.appendChild(s);
      } else {
        renderPdf(url);
      }
    }

    function renderPdf(url) {
      pdfjsLib.getDocument(url).promise.then(function(doc) {
        _pdfDoc = doc;
        return doc.getPage(1);
      }).then(function(page) {
        _pdfPage = page;
        var wrap = document.getElementById('canvas-wrap');
        var vp = page.getViewport({ scale: 1 });
        var fitScale = Math.min(wrap.clientWidth / vp.width, wrap.clientHeight / vp.height) * 0.95;
        var viewport = page.getViewport({ scale: fitScale });
        var canvas = document.getElementById('dwg-canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        _scale = 1;
        _tx = (wrap.clientWidth - viewport.width) / 2;
        _ty = (wrap.clientHeight - viewport.height) / 2;
        applyTransform();
        page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport });
        renderPins();
      }).catch(function(e) {
        console.warn('[PDF] render error:', e);
        document.getElementById('vwr-empty').style.display = 'flex';
        document.getElementById('dwg-canvas').style.display = 'none';
      });
    }

    // ── Pan / Zoom ─────────────────────────────────────────
    function applyTransform() {
      var c = document.getElementById('dwg-canvas');
      c.style.transform = 'translate(' + _tx + 'px,' + _ty + 'px) scale(' + _scale + ')';
      var pl = document.getElementById('pins-layer');
      pl.style.transform = 'translate(' + _tx + 'px,' + _ty + 'px) scale(' + _scale + ')';
    }

    window.vwrZoom = function(factor) {
      var wrap = document.getElementById('canvas-wrap');
      var cx = wrap.clientWidth / 2;
      var cy = wrap.clientHeight / 2;
      _tx = cx - factor * (cx - _tx);
      _ty = cy - factor * (cy - _ty);
      _scale *= factor;
      applyTransform();
    };

    window.vwrFit = function() {
      if (!_pdfPage) return;
      var wrap = document.getElementById('canvas-wrap');
      var canvas = document.getElementById('dwg-canvas');
      _scale = 1;
      _tx = (wrap.clientWidth - canvas.width) / 2;
      _ty = (wrap.clientHeight - canvas.height) / 2;
      applyTransform();
    };

    // Mouse events
    var wrap = document.getElementById('canvas-wrap');

    wrap.addEventListener('mousedown', function(e) {
      if (_currentTool !== 'pan') return;
      _dragging = true;
      _lastX = e.clientX;
      _lastY = e.clientY;
    });
    window.addEventListener('mousemove', function(e) {
      if (!_dragging) return;
      _tx += e.clientX - _lastX;
      _ty += e.clientY - _lastY;
      _lastX = e.clientX;
      _lastY = e.clientY;
      applyTransform();
    });
    window.addEventListener('mouseup', function() { _dragging = false; });

    wrap.addEventListener('click', function(e) {
      if (_currentTool === 'pan') return;
      var rect = wrap.getBoundingClientRect();
      var canvas = document.getElementById('dwg-canvas');
      var px = (e.clientX - rect.left - _tx) / _scale;
      var py = (e.clientY - rect.top - _ty) / _scale;
      _pendingPinCoords = { x: px / canvas.width, y: py / canvas.height };
      openPinModal(_currentTool);
    });

    // Touch events
    wrap.addEventListener('touchstart', function(e) {
      if (e.touches.length === 1) {
        var t = e.touches[0];
        if (_currentTool !== 'pan') {
          // Will handle in touchend
          _lastX = t.clientX; _lastY = t.clientY;
          return;
        }
        _dragging = true;
        _lastX = t.clientX; _lastY = t.clientY;
      } else if (e.touches.length === 2) {
        _dragging = false;
        var dx = e.touches[0].clientX - e.touches[1].clientX;
        var dy = e.touches[0].clientY - e.touches[1].clientY;
        _lastPinchDist = Math.sqrt(dx*dx + dy*dy);
      }
    }, { passive: true });

    wrap.addEventListener('touchmove', function(e) {
      e.preventDefault();
      if (e.touches.length === 1 && _dragging) {
        var t = e.touches[0];
        _tx += t.clientX - _lastX;
        _ty += t.clientY - _lastY;
        _lastX = t.clientX; _lastY = t.clientY;
        applyTransform();
      } else if (e.touches.length === 2) {
        var dx = e.touches[0].clientX - e.touches[1].clientX;
        var dy = e.touches[0].clientY - e.touches[1].clientY;
        var dist = Math.sqrt(dx*dx + dy*dy);
        var factor = dist / _lastPinchDist;
        var cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        var cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        var rect = wrap.getBoundingClientRect();
        var ox = cx - rect.left;
        var oy = cy - rect.top;
        _tx = ox - factor * (ox - _tx);
        _ty = oy - factor * (oy - _ty);
        _scale *= factor;
        _lastPinchDist = dist;
        applyTransform();
      }
    }, { passive: false });

    wrap.addEventListener('touchend', function(e) {
      if (e.changedTouches.length === 1 && _currentTool !== 'pan') {
        var t = e.changedTouches[0];
        // Only trigger if tap (not drag)
        if (Math.abs(t.clientX - _lastX) < 8 && Math.abs(t.clientY - _lastY) < 8) {
          var rect = wrap.getBoundingClientRect();
          var canvas = document.getElementById('dwg-canvas');
          var px = (t.clientX - rect.left - _tx) / _scale;
          var py = (t.clientY - rect.top - _ty) / _scale;
          _pendingPinCoords = { x: px / canvas.width, y: py / canvas.height };
          openPinModal(_currentTool);
        }
      }
      _dragging = false;
    });

    // ── Tools ──────────────────────────────────────────────
    window.setTool = function(tool) {
      _currentTool = tool;
      ['pan','defect','itp','fire'].forEach(function(t) {
        var btn = document.getElementById('tool-' + t);
        if (!btn) return;
        btn.classList.remove('active','defect-active','itp-active','fire-active');
      });
      var active = document.getElementById('tool-' + tool);
      if (active) active.classList.add('active', tool !== 'pan' ? tool + '-active' : '');
      document.getElementById('dwg-canvas').classList.toggle('placing', tool !== 'pan');
    };

    // ── Pins ───────────────────────────────────────────────
    function renderPins() {
      var layer = document.getElementById('pins-layer');
      if (!_currentDrawing || !layer) return;
      var canvas = document.getElementById('dwg-canvas');
      layer.innerHTML = '';
      layer.style.width = canvas.width + 'px';
      layer.style.height = canvas.height + 'px';
      (_currentDrawing.pins || []).forEach(function(pin) {
        var el = document.createElement('div');
        el.className = 'pin-marker pin-' + pin.type;
        el.style.left = (pin.x * canvas.width) + 'px';
        el.style.top  = (pin.y * canvas.height) + 'px';
        el.innerHTML = '<span>' + (pin.ref || '?') + '</span>';
        el.onclick = function(e) { e.stopPropagation(); showPinDetail(pin); };
        layer.appendChild(el);
      });
    }

    function nextPinRef(type) {
      var prefix = { defect:'DEF', itp:'ITP', fire:'FIR' }[type] || 'PIN';
      var max = 0;
      _drawings.forEach(function(d) {
        (d.pins || []).forEach(function(p) {
          if (p.type === type) {
            var n = parseInt((p.ref || '').replace(prefix + '-', '')) || 0;
            if (n > max) max = n;
          }
        });
      });
      return prefix + '-' + String(max + 1).padStart(3, '0');
    }

    // ── Pin Modal ──────────────────────────────────────────
    function openPinModal(type) {
      var titles = { defect:'Add Defect', itp:'Add ITP Pin', fire:'Add Fire Rating Pin' };
      document.getElementById('pin-modal-title').textContent = titles[type] || 'Add Pin';
      document.getElementById('pin-desc').value = '';
      document.getElementById('pin-location').value = '';
      document.getElementById('pin-status').value = 'Open';
      document.getElementById('pin-modal-overlay').style.display = 'flex';
    }

    window.closePinModal = function() {
      document.getElementById('pin-modal-overlay').style.display = 'none';
      _pendingPinCoords = null;
    };

    window.savePin = function() {
      if (!_currentDrawing || !_pendingPinCoords) return;
      var desc = document.getElementById('pin-desc').value.trim();
      if (!desc) { alert('Please enter a description.'); return; }
      var pin = {
        id: 'pin-' + Date.now(),
        type: _currentTool,
        ref: nextPinRef(_currentTool),
        x: _pendingPinCoords.x,
        y: _pendingPinCoords.y,
        desc: desc,
        location: document.getElementById('pin-location').value.trim(),
        status: document.getElementById('pin-status').value,
        created: new Date().toISOString().split('T')[0]
      };
      if (!_currentDrawing.pins) _currentDrawing.pins = [];
      _currentDrawing.pins.push(pin);
      saveDrawings();
      closePinModal();
      setTool('pan');
      renderPins();
    };

    // ── Pin Detail ─────────────────────────────────────────
    function showPinDetail(pin) {
      var typeLabel = { defect:'Defect', itp:'ITP', fire:'Fire' }[pin.type] || pin.type;
      var html = '<div class="pin-detail-header">'
        + '<div><div class="pin-ref ' + pin.type + '">' + pin.ref + '</div><div style="font-size:13px;color:var(--text-secondary);margin-top:2px">' + typeLabel + ' Pin</div></div>'
        + '<button onclick="closePinDetail()" style="width:32px;height:32px;border-radius:50%;background:var(--bg-elevated);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;font-size:18px">×</button>'
        + '</div>'
        + '<div class="detail-field"><div class="detail-label">Description</div><div class="detail-value">' + (pin.desc || '—') + '</div></div>'
        + (pin.location ? '<div class="detail-field"><div class="detail-label">Location</div><div class="detail-value">' + pin.location + '</div></div>' : '')
        + '<div class="detail-field"><div class="detail-label">Status</div><div class="detail-value"><span class="status status-' + (pin.status === 'Closed' ? 'done' : pin.status === 'In Progress' ? 'progress' : 'open') + '">' + pin.status + '</span></div></div>'
        + '<div class="detail-field"><div class="detail-label">Created</div><div class="detail-value">' + (pin.created || '—') + '</div></div>'
        + '<div style="margin-top:16px;display:flex;gap:10px">'
        + '<button class="btn btn-danger" style="flex:1" onclick="deletePin(\'' + pin.id + '\')">Delete Pin</button>'
        + '</div>';
      document.getElementById('pin-detail-content').innerHTML = html;
      document.getElementById('pin-detail-overlay').style.display = 'flex';
    }

    window.closePinDetail = function() {
      document.getElementById('pin-detail-overlay').style.display = 'none';
    };

    window.deletePin = function(pinId) {
      if (!_currentDrawing) return;
      _currentDrawing.pins = (_currentDrawing.pins || []).filter(function(p) { return p.id !== pinId; });
      saveDrawings();
      closePinDetail();
      renderPins();
    };
  </script>
</body>
</html>
