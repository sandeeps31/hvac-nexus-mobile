<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1, maximum-scale=10.0, user-scalable=yes">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      background:#2a2a2a;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #pdf-wrap {
      background:#2a2a2a;
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      height:100%;
      padding:12px;
    }
    embed {
      display:block;
      width:100%;
      height:100%;
      box-shadow:0 4px 32px rgba(0,0,0,0.7);
    }
  </style>
</head>
<body>
  <div id="pdf-wrap">
    <embed id="pdf-obj" type="application/pdf" />
  </div>
  <script>
    var url = new URLSearchParams(window.location.search).get('url');
    if (url) {
      document.getElementById('pdf-obj').src = url + '#toolbar=0';
    }
  </script>
</body>
</html>
