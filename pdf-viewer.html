<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1, maximum-scale=10.0, user-scalable=yes">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      background:#2a2a2a;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    #pdf-obj {
      width:100vw;
      height:100vh;
      border:none;
      display:block;
    }
  </style>
</head>
<body>
  <embed id="pdf-obj" type="application/pdf" />
  <script>
    var url = new URLSearchParams(window.location.search).get('url');
    if (url) {
      document.getElementById('pdf-obj').src = url + '#view=Fit&toolbar=0';
    }
  </script>
</body>
</html>
