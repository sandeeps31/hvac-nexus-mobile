<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F5F7FA">
  <title>Equipment — HVAC Nexus</title>
  <link rel="stylesheet" href="app.css">
  <style>
    /* ── Tab Pills ── */
    .equip-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }
    .equip-tabs::-webkit-scrollbar { display: none; }

    /* ── Search ── */
    .search-bar {
      position: relative;
      margin-bottom: 14px;
    }
    .search-bar svg {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-tertiary);
      pointer-events: none;
      width: 18px; height: 18px;
    }
    .search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 11px 12px 11px 40px;
      font-size: 15px;
      font-family: var(--font);
      color: var(--text-primary);
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-tertiary); }

    /* ── Rev Banner ── */
    .rev-banner {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .rev-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .rev-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      font-family: var(--font-mono);
    }

    /* ── Equipment Card ── */
    .equip-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      margin-bottom: 10px;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow 0.15s;
    }
    .equip-card:active { box-shadow: 0 0 0 2px var(--accent); }
    .equip-card-header {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .equip-tag {
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--accent);
      background: var(--accent-dim);
      padding: 4px 8px;
      border-radius: 6px;
      flex-shrink: 0;
      min-width: 70px;
      text-align: center;
    }
    .equip-info { flex: 1; min-width: 0; }
    .equip-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .equip-sub {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .equip-chevron {
      color: var(--text-tertiary);
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .equip-card.expanded .equip-chevron { transform: rotate(180deg); }

    /* ── Equipment Detail ── */
    .equip-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 12px 14px;
      background: var(--bg-elevated);
    }
    .equip-card.expanded .equip-detail { display: block; }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .detail-item { }
    .detail-item.full { grid-column: 1 / -1; }
    .detail-item-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-tertiary);
      margin-bottom: 3px;
    }
    .detail-item-value {
      font-size: 13px;
      color: var(--text-primary);
      font-weight: 500;
    }
    .detail-item-value.mono { font-family: var(--font-mono); font-size: 12px; }

    /* ── Read Only Badge ── */
    .readonly-banner {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      font-size: 12px;
      color: #92400E;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .readonly-banner svg { width: 16px; height: 16px; flex-shrink: 0; color: #F59E0B; }
  </style>
</head>
<body>
  <script src="db.js"></script>
  <script>
    'use strict';

    var _equipData = null;
    var _activeTab = 0;
    var _activeRevIdx = null;

    // ── Load Equipment Data ────────────────────────────────
    async function loadEquipment() {
      var proj = dbGetCurrentProject();
      if (!proj) return null;
      try {
        await dbReady;
        var companyId = localStorage.getItem('hvacnexus_company_id');
        var pNum = proj.code || proj.num || proj.id;

        // Load equipment tabs
        var res = await window._supabase
          .from('equipment')
          .select('data')
          .eq('company_id', companyId)
          .eq('project_num', pNum)
          .single();

        if (res.data && res.data.data) return res.data.data;
      } catch(e) { console.warn('[Equipment] load error:', e); }
      return null;
    }

    // ── Get last published rev ─────────────────────────────
    function getLastPublishedRev(tab) {
      if (!tab || !tab.revisions) return null;
      for (var i = tab.revisions.length - 1; i >= 0; i--) {
        if (tab.revisions[i].published) return i;
      }
      return null;
    }

    // ── Render Equipment Page ──────────────────────────────
    window.renderEquipmentPage = async function(container) {
      container.innerHTML = '<div class="page"><div class="spinner"></div></div>';
      _equipData = await loadEquipment();

      if (!_equipData || !_equipData.tabs || _equipData.tabs.length === 0) {
        container.innerHTML = '<div class="page"><div class="empty-state">'
          + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'
          + '<p>No equipment schedules found.<br>Add equipment in the desktop app.</p>'
          + '</div></div>';
        return;
      }

      var tabs = _equipData.tabs;
      _activeTab = Math.min(_activeTab, tabs.length - 1);
      renderEquipTab(container, tabs);
    };

    function renderEquipTab(container, tabs) {
      var tab = tabs[_activeTab];
      var revIdx = getLastPublishedRev(tab);
      _activeRevIdx = revIdx;

      var rows = [];
      if (revIdx !== null && tab.revisions && tab.revisions[revIdx]) {
        rows = tab.revisions[revIdx].rows || [];
      }

      var html = '<div class="page">';

      // Read only notice
      html += '<div class="readonly-banner">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>'
        + 'View only — edit in the desktop app'
        + '</div>';

      // Tabs
      html += '<div class="equip-tabs">';
      tabs.forEach(function(t, i) {
        html += '<button class="pill-tab' + (i === _activeTab ? ' active' : '') + '" onclick="switchEquipTab(' + i + ')">' + (t.name || 'Tab ' + (i+1)) + '</button>';
      });
      html += '</div>';

      // Revision banner
      if (revIdx !== null && tab.revisions[revIdx]) {
        var rev = tab.revisions[revIdx];
        html += '<div class="rev-banner">'
          + '<span class="rev-label">Published Revision</span>'
          + '<span class="rev-value">' + (rev.label || 'Rev ' + revIdx) + '</span>'
          + '</div>';
      } else {
        html += '<div class="rev-banner">'
          + '<span class="rev-label">Status</span>'
          + '<span style="font-size:12px;color:var(--accent-amber);font-weight:600">No published revision</span>'
          + '</div>';
      }

      // Search
      html += '<div class="search-bar">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
        + '<input class="search-input" id="equip-search" placeholder="Search equipment…" oninput="filterEquip()" type="search">'
        + '</div>';

      // Equipment cards
      html += '<div id="equip-list">';
      if (rows.length === 0) {
        html += '<div class="empty-state" style="padding:40px 0"><p>No equipment rows in this revision.</p></div>';
      } else {
        rows.forEach(function(row, idx) {
          html += renderEquipCard(row, idx);
        });
      }
      html += '</div></div>';

      container.innerHTML = html;
    }

    function renderEquipCard(row, idx) {
      // Build a list of all non-empty fields for detail view
      var fields = [];
      var skipKeys = ['id','tag','name','description'];
      Object.keys(row).forEach(function(k) {
        if (skipKeys.indexOf(k) !== -1) return;
        if (!row[k] && row[k] !== 0) return;
        fields.push({ label: k, value: row[k] });
      });

      var html = '<div class="equip-card" id="ec-' + idx + '" onclick="toggleEquipCard(' + idx + ')">'
        + '<div class="equip-card-header">'
        +   '<div class="equip-tag">' + (row.tag || row.id || '—') + '</div>'
        +   '<div class="equip-info">'
        +     '<div class="equip-name">' + (row.name || row.description || 'Unnamed') + '</div>'
        +     '<div class="equip-sub">' + (row.type || row.model || '') + '</div>'
        +   '</div>'
        +   '<svg class="equip-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>'
        + '</div>';

      if (fields.length > 0) {
        html += '<div class="equip-detail"><div class="detail-grid">';
        fields.forEach(function(f) {
          var isLong = String(f.value).length > 20;
          html += '<div class="detail-item' + (isLong ? ' full' : '') + '">'
            + '<div class="detail-item-label">' + f.label + '</div>'
            + '<div class="detail-item-value">' + f.value + '</div>'
            + '</div>';
        });
        html += '</div></div>';
      }

      html += '</div>';
      return html;
    }

    window.toggleEquipCard = function(idx) {
      var card = document.getElementById('ec-' + idx);
      if (card) card.classList.toggle('expanded');
    };

    window.switchEquipTab = function(idx) {
      _activeTab = idx;
      var container = document.getElementById('app-main');
      if (container) renderEquipTab(container, _equipData.tabs);
    };

    window.filterEquip = function() {
      var q = (document.getElementById('equip-search').value || '').toLowerCase();
      document.querySelectorAll('.equip-card').forEach(function(card) {
        card.style.display = card.textContent.toLowerCase().indexOf(q) !== -1 ? '' : 'none';
      });
    };
  </script>
</body>
</html>
