<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HVAC Nexus">
  <meta name="theme-color" content="#0A1628">
  <title>HVAC Nexus</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- Status Bar Spacer (iOS) -->
  <div id="status-bar-spacer"></div>

  <!-- Top Header -->
  <header id="app-header">
    <button id="back-btn" class="header-btn hidden" onclick="appGoBack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="header-title">
      <span id="header-main">HVAC Nexus</span>
      <span id="header-sub"></span>
    </div>
    <div class="header-right">
      <div id="sync-indicator" class="sync-dot offline" title="Offline"></div>
      <button id="header-action-btn" class="header-btn hidden"></button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main id="app-main">
    <!-- Pages are injected here -->
  </main>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-item active" data-page="home" onclick="appNav('home')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-page="technical" onclick="appNav('technical')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>Technical</span>
    </button>
    <button class="nav-item" data-page="quality" onclick="appNav('quality')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Quality</span>
    </button>
    <button class="nav-item" data-page="commissioning" onclick="appNav('commissioning')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
      <span>Cx</span>
    </button>
    <button class="nav-item" data-page="procurement" onclick="appNav('procurement')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Procurement</span>
    </button>
  </nav>

  <!-- Offline Toast -->
  <div id="offline-toast" class="toast hidden">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
    You're offline — changes will sync when reconnected
  </div>

  <!-- Sync Toast -->
  <div id="sync-toast" class="toast sync hidden">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    Syncing changes…
  </div>

  <script src="db.js"></script>
  <script>
    // Redirect to login if no session
    dbReady.then(function(sb) {
      sb.auth.getSession().then(function(res) {
        if (!res.data || !res.data.session) {
          window.location.href = 'login.html';
        }
      });
    });
  </script>
  <script src="app.js"></script>
</body>
</html>
